<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Bar chart bars -->
  <rect x="5" y="18" width="5" height="9" rx="1.5" fill="white" opacity="0.6"/>
  <rect x="13" y="12" width="5" height="15" rx="1.5" fill="white" opacity="0.85"/>
  <rect x="21" y="7" width="5" height="20" rx="1.5" fill="white"/>
  <!-- Trend line -->
  <polyline points="7.5,17 15.5,11 23.5,6" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <!-- Dot on trend line tip -->
  <circle cx="23.5" cy="6" r="1.8" fill="white"/>
</svg>
